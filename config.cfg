# GNSS Reporter 配置文件示例 (LuatOS / Air780EP + 外置 GPS)
# 复制为 config.cfg 后按需修改；请勿将含真实 token 的 config.cfg 提交到仓库
# 每行格式: key=value ，# 开头为注释

# Traccar 服务器 留空则不发送Traccar
traccar_host=traccar_report.ctsdn.com
traccar_port=2232

# FOTA 升级地址 留空则不请求升级。示例: http://luatos-fota.ctsdn.com:2232/upgrade
fota_url=http://luatos-fota.ctsdn.com:2232/upgrade
#FOTA会下载新的配置文件，但是生效文件是在FS分区内，修改配置文件请使用Traccar的指令下发

moving_interval=1
still_interval=120
still_speed_threshold=5

# APRS 配置 callsign留空则不发送APRS
aprs_callsign=BI1FQO
aprs_ssid=BI1FQO-YD
aprs_message=YED-GNSS-Reporter
aprs_icon=>
aprs_passcode=20898
aprs_host=china.aprs2.net
aprs_port=14580
#最小间隔30秒
aprs_interval=60

# Reload 按键 GPIO30：按下接 GND 时程序退出（刷机模式）
flash_gpio=30

network_check_timeout=60
http_timeout=10
max_backoff=60

# 硬件看门狗 GPIO28，150 秒喂一次
wdt_period=60

# LBS 基站定位：留空 lbs_server 时使用内置 lbsLoc2（合宙单基站，约 2 分钟/次限制）
lbs_server=
lbs_port=80
lbs_token=
lbs_timeout=30
lbs_profile_idx=1
lbs_interval=300

# 上报测试模式：1=使用固定坐标上报（不依赖 GNSS），验证 Traccar/APRS 后改回 0
test_report_mode=0
test_lat=40.88888
test_lon=116.66666
test_alt=41.60
test_speed=2
test_course=200
test_accuracy=2
